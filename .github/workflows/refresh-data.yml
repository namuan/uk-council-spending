name: Refresh council data

on:
  schedule:
    # Run monthly on the 1st at 6:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Full git history so the commit gets pushed properly
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pandas

      - name: Fetch latest council data from API
        run: |
          # Get slug list from sitemap
          curl -s https://www.civaccount.co.uk/sitemap.xml | \
            grep '/council/' | \
            sed 's/.*\/council\///;s/<.*//' | \
            sort -u | \
            python3 -c "import json,sys; json.dump([l.strip() for l in sys.stdin if '/' not in l.strip()], open('data_raw/all_slugs.json','w'))"
          # Fetch all councils
          python3 fetch_all_councils.py --force

      - name: Rebuild generated data
        run: |
          python3 build_council_data.py

      - name: Sync docs/ for GitHub Pages
        run: |
          rsync -a --delete dash/ docs/dash/
          cp index.html docs/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dash/ docs/ data_raw/all_slugs.json
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "chore: auto-refresh council data [skip ci]" && \
             git push)
